name: Compilación Multiplataforma (PiloPress)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release-binaries:
    name: Compilar para ${{ matrix.os-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            artifact-path: dist/PiloPress.exe

          - os: ubuntu-latest
            os-name: Linux
            artifact-path: dist/PiloPress

          - os: macos-latest
            os-name: macOS
            artifact-path: dist/PiloPress-macOS.app.zip

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      # --- CONFIGURACIÓN DE PYTHON SEGÚN EL SISTEMA ---
      - name: Configurar Python (Windows y Linux)
        if: matrix.os != 'macos-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Python con Tkinter completo via Homebrew (Solo macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install python@3.11 tcl-tk
          echo "/opt/homebrew/opt/python@3.11/bin" >> $GITHUB_PATH

      # --- DEPENDENCIAS DEL SISTEMA (LINUX) ---
      - name: Instalar dependencias del sistema (Solo Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev patchelf

      # --- INSTALACIÓN DE LIBRERÍAS (Doble comando por compatibilidad de alias) ---
      - name: Instalar librerías de Python
        run: |
          python -m pip install --upgrade pip || python3 -m pip install --upgrade pip
          python -m pip install customtkinter pillow pyinstaller || python3 -m pip install customtkinter pillow pyinstaller

      # --- COMPILACIÓN ---
      - name: Compilar ejecutable con PyInstaller
        run: |
          pyinstaller --clean --onefile --windowed --collect-all customtkinter --name PiloPress app.py || python3 -m PyInstaller --clean --onefile --windowed --collect-all customtkinter --name PiloPress app.py

      # --- POST-PROCESADO (Solo macOS) ---
      - name: Comprimir paquete .app (Solo macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r PiloPress-macOS.app.zip PiloPress.app

      # --- ENVIAR ARCHIVOS A GITHUB ---
      - name: Subir binario como artefacto de GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os-name }}-binario
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14